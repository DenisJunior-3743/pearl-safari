<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ============================================================
       Pearl Safari — Discover Page (discover.html)
       Lists ALL attractions with category filter buttons.
       Filter state is read from URL ?category=parks on load.
       ============================================================ -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discover Destinations | Pearl Safari Uganda</title>
  <meta name="description" content="Explore all of Uganda's tourist attractions — national parks, lakes, mountains, culture, and adventure. Filter by type and discover your perfect safari.">

  <link rel="icon" type="image/svg+xml" href="assets/logo/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="navbar-placeholder"></div>

  <!-- ============================================================
       PAGE HERO — compact, not full-screen
       ============================================================ -->
  <section style="
    background: linear-gradient(135deg, var(--color-dark) 0%, var(--color-primary) 100%);
    padding: calc(var(--navbar-height) + 4rem) 0 4rem;
    position: relative; overflow: hidden;
  ">
    <!-- Decorative background elements -->
    <div style="position:absolute;width:500px;height:500px;border-radius:50%;background:rgba(255,255,255,0.03);top:-200px;right:-100px;pointer-events:none;"></div>
    <div style="position:absolute;width:300px;height:300px;border-radius:50%;background:rgba(255,255,255,0.02);bottom:-100px;left:-50px;pointer-events:none;"></div>

    <div class="container" style="position:relative;z-index:1;text-align:center;">
      <span class="section-label" style="background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.85);">
        All Destinations
      </span>
      <h1 style="color:white;font-size:clamp(2rem,5vw,3.5rem);margin:1rem 0 1rem;">
        Discover <em style="color:var(--color-accent);">Uganda</em>
      </h1>
      <p style="color:rgba(255,255,255,0.75);font-size:1.125rem;max-width:560px;margin:0 auto;">
        Browse all destinations, filter by type, and find your next adventure.
      </p>

      <!-- Live search box -->
      <div style="
        max-width:420px;margin:2rem auto 0;
        position:relative;
      ">
        <i class="fas fa-search" style="
          position:absolute;left:1rem;top:50%;transform:translateY(-50%);
          color:var(--color-text-light);font-size:0.9rem;
        "></i>
        <input
          type="search"
          id="search-input"
          placeholder="Search destinations…"
          style="
            width:100%;padding:0.875rem 1rem 0.875rem 2.75rem;
            border:2px solid rgba(255,255,255,0.2);border-radius:9999px;
            background:rgba(255,255,255,0.1);backdrop-filter:blur(8px);
            color:white;font-family:var(--font-accent);font-size:0.875rem;
            outline:none;transition:all 0.3s ease;
          "
        >
      </div>
    </div>
  </section>


  <!-- ============================================================
       FILTER BAR — sticky, updates URL and card grid
       ============================================================ -->
  <div class="filter-section">
    <div class="container">
      <div class="filter-wrap" id="filter-wrap" role="group" aria-label="Filter by category">
        <!-- Filter buttons rendered by discover.js from data.json categories -->
        <!-- Skeleton while loading -->
        <div style="display:flex;gap:0.5rem;">
          <div class="skeleton" style="width:80px;height:40px;border-radius:9999px;"></div>
          <div class="skeleton" style="width:120px;height:40px;border-radius:9999px;"></div>
          <div class="skeleton" style="width:80px;height:40px;border-radius:9999px;"></div>
          <div class="skeleton" style="width:110px;height:40px;border-radius:9999px;"></div>
          <div class="skeleton" style="width:90px;height:40px;border-radius:9999px;"></div>
        </div>
      </div>
    </div>
  </div>


  <!-- ============================================================
       ATTRACTIONS GRID
       ============================================================ -->
  <section class="section bg-white">
    <div class="container">

      <!-- Results count label -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;" id="results-bar">
        <p id="results-count" style="font-family:var(--font-accent);font-size:0.875rem;color:var(--color-text-muted);margin:0;">
          Loading destinations…
        </p>
        <!-- Sort dropdown -->
        <select id="sort-select" style="
          padding:0.5rem 1rem;border:2px solid var(--color-border);
          border-radius:var(--radius-md);font-family:var(--font-accent);
          font-size:0.875rem;color:var(--color-text);outline:none;cursor:pointer;
          transition:var(--transition-fast);background:white;
        ">
          <option value="default">Sort: Featured First</option>
          <option value="rating">Sort: Highest Rated</option>
          <option value="name">Sort: A → Z</option>
        </select>
      </div>

      <!-- Cards grid — populated by discover.js -->
      <div class="cards-grid" id="discover-grid">
        <!-- Skeleton loaders shown while data.json fetches -->
        ${Array.from({length:6}).map(() => `
          <div class="attraction-card">
            <div class="skeleton" style="height:220px;"></div>
            <div style="padding:1.5rem;">
              <div class="skeleton" style="height:12px;width:60%;border-radius:4px;margin-bottom:8px;"></div>
              <div class="skeleton" style="height:20px;width:80%;border-radius:4px;margin-bottom:12px;"></div>
              <div class="skeleton" style="height:12px;border-radius:4px;margin-bottom:6px;"></div>
              <div class="skeleton" style="height:12px;width:70%;border-radius:4px;"></div>
            </div>
          </div>
        `).join('')}
      </div>

      <!-- Empty state (shown when filter returns 0 results) -->
      <div id="empty-state" style="display:none;text-align:center;padding:5rem 2rem;">
        <i class="fas fa-search" style="font-size:3rem;color:var(--color-border);margin-bottom:1.5rem;"></i>
        <h3 style="color:var(--color-text-muted);margin-bottom:0.5rem;">No destinations found</h3>
        <p>Try a different filter or search term.</p>
        <button onclick="resetFilters()" class="btn btn-outline-dark" style="margin-top:1.5rem;">
          <i class="fas fa-redo"></i> Reset Filters
        </button>
      </div>

    </div>
  </section>


  <!-- ============================================================
       MAP SECTION on Discover page too
       ============================================================ -->
  <section class="map-section bg-surface">
    <div class="container">
      <div class="section-header" data-aos="fade-up">
        <span class="section-label">Map View</span>
        <h2>Attractions on the Map</h2>
        <div class="divider"></div>
      </div>
      <div id="uganda-map" data-aos="fade-up"></div>
    </div>
  </section>


  <div id="footer-placeholder"></div>


  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.0/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="categories/components.js?v=1.0.0"></script>
  <script src="categories/animations.js?v=1.0.0"></script>
  <script src="categories/map.js?v=1.0.0"></script>
  <script src="categories/discover.js?v=1.0.0"></script>

</body>
</html>
